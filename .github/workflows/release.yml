name: "release"

on:
  push:
    tags: ["v*"]

permissions:
  contents: "write" # goreleaser creates the GitHub release and uploads the archives.

jobs:
  release:
    name: "release@ubuntu-latest"
    runs-on: "ubuntu-latest"
    timeout-minutes: 20
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          # goreleaser needs the full history and tags for changelog/versioning.
          fetch-depth: 0

      - uses: "bckground/actions/setup-mise@main"
        with:
          cache-backend: "github"

      - id: "go-restore-caches"
        uses: "bckground/actions/cache-go/restore@main"
        with:
          cache-backend: "github"
          name: "release"

      - name: "Run goreleaser"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          goreleaser release --clean

      - if: ${{ (github.ref_name == github.event.repository.default_branch || steps.go-restore-caches.outputs.cache_hit == 'false') && (success() || failure()) }}
        uses: "bckground/actions/cache-go/save@main"
        with:
          cache-backend: "github"
          name: "release"
